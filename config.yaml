llm:
  model: "llama-3.3-70b-versatile"
  temperature: 0.2
  max_tokens: 1024

embedding:
  model: "BAAI/bge-small-en-v1.5"

retrieval:
  vector_threshold: 0.55
  top_k_vector: 4
  top_k_graph: 3

web_search:
  provider: "duckduckgo"
  max_results: 5

storage:
  chroma_path: "./data/chroma_db"
  kuzu_path: "./data/kuzu_db/graph.db"
  sqlite_path: "./logs/interactions.db"

dedup:
  similarity_threshold: 0.95
